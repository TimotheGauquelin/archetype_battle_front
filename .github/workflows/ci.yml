name: CI

# Déclencheurs : quand le workflow s'exécute
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Permissions pour le workflow
permissions:
  contents: read
  checks: write

jobs:
  # Job pour les tests unitaires avec Jest
  test-unit:
    name: Tests unitaires
    runs-on: ubuntu-latest
    
    steps:
      # 1. Récupérer le code source
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. Configurer Node.js avec cache npm
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      # 3. Installer les dépendances
      - name: Install dependencies
        run: npm ci
      
      # 4. Lancer les tests unitaires
      - name: Run unit tests
        run: npm test -- --watchAll=false --coverage --ci
      
      # 5. Uploader la couverture de code (optionnel)
      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # Job pour les tests end-to-end avec Playwright
  test-e2e:
    name: Tests end-to-end
    runs-on: ubuntu-latest
    
    steps:
      # 1. Récupérer le code source
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. Configurer Node.js avec cache npm
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      # 3. Installer les dépendances
      - name: Install dependencies
        run: npm ci
      
      # 4. Installer les navigateurs Playwright
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      # 5. Build de l'application (nécessaire pour les tests e2e)
      - name: Build application
        run: npm run build
      
      # 6. Lancer les tests Playwright
      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: true  # Active le mode CI pour Playwright
      
      # 7. Uploader les résultats des tests (rapports HTML)
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # Job pour le build de production
  build:
    name: Build production
    runs-on: ubuntu-latest
    
    steps:
      # 1. Récupérer le code source
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. Configurer Node.js avec cache npm
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      # 3. Installer les dépendances
      - name: Install dependencies
        run: npm ci
      
      # 4. Build de l'application
      - name: Build application
        run: npm run build
      
      # 5. Uploader les artefacts de build (optionnel)
      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: build/
          retention-days: 7

